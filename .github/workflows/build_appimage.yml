name: Build AppImage

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install system deps
        run: |
          sudo apt-get update
          sudo apt-get install -y patchelf libglib2.0-0 libsm6 libxrender1 libxext6 libglu1-mesa

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt pyinstaller

      - name: Build standalone binary with PyInstaller
        run: |
          pyinstaller --onefile --windowed --name MedFlow main.py

      - name: Prepare AppDir
        run: |
          mkdir -p build/MedFlow.AppDir/usr/bin
          cp dist/MedFlow build/MedFlow.AppDir/usr/bin/
          cat > build/MedFlow.AppDir/AppRun <<'APPRUN'
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "$0")")"
          exec "$HERE/usr/bin/MedFlow" "$@"
          APRUN
          chmod +x build/MedFlow.AppDir/AppRun

      - name: Download appimagetool
        run: |
          curl -L -o appimagetool https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool

      - name: Build AppImage
        run: |
          ./appimagetool build/MedFlow.AppDir dist/MedFlow.AppImage
          ls -l dist || true

      - name: Create GitHub release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: appimage-v${{ github.run_id }}
          release_name: MedFlow AppImage ${{ github.run_id }}
          body: Automated AppImage build
          draft: false
          prerelease: false

      - name: Upload AppImage to release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: dist/MedFlow.AppImage
          asset_name: MedFlow.AppImage
          asset_content_type: application/octet-stream
