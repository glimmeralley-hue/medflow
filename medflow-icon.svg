<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Glass morphism gradients -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF9A9E"/>
      <stop offset="50%" stop-color="#FECFEF"/>
      <stop offset="100%" stop-color="#FECFEF"/>
    </linearGradient>
    <linearGradient id="glassGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="white" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="white" stop-opacity="0.1"/>
    </linearGradient>
    <linearGradient id="stethGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#C44569"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="#FF6B9D" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <!-- Rounded square background with glass effect -->
  <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="url(#bgGrad)" filter="url(#dropShadow)"/>
  
  <!-- Inner glass highlight -->
  <rect x="32" y="32" width="448" height="448" rx="100" ry="100" fill="url(#glassGrad)"/>
  
  <!-- Top shine effect -->
  <ellipse cx="256" cy="100" rx="180" ry="60" fill="white" opacity="0.3"/>
  
  <!-- Stethoscope -->
  <!-- Ear tubes -->
  <path d="M 180 140 Q 180 100 200 100 Q 220 100 220 140" stroke="url(#stethGrad)" stroke-width="12" fill="none" stroke-linecap="round"/>
  <path d="M 292 140 Q 292 100 312 100 Q 332 100 332 140" stroke="url(#stethGrad)" stroke-width="12" fill="none" stroke-linecap="round"/>
  
  <!-- Y-junction -->
  <path d="M 200 140 Q 200 180 256 200 Q 312 180 312 140" stroke="url(#stethGrad)" stroke-width="12" fill="none"/>
  
  <!-- Tube to chest piece -->
  <path d="M 256 200 L 256 280" stroke="url(#stethGrad)" stroke-width="14" fill="none" stroke-linecap="round"/>
  
  <!-- Chest piece (circle with gradient) -->
  <circle cx="256" cy="320" r="55" fill="url(#stethGrad)" filter="url(#glow)"/>
  <circle cx="256" cy="320" r="45" fill="url(#bgGrad)"/>
  <circle cx="256" cy="320" r="35" fill="white" opacity="0.9"/>
  
  <!-- Heart pulse line in center -->
  <path d="M 236 320 L 246 320 L 251 305 L 256 335 L 261 310 L 266 320 L 276 320" 
        stroke="#FF6B9D" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Floating sparkles -->
  <circle cx="100" cy="150" r="8" fill="white" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="420" cy="200" r="6" fill="white" opacity="0.6">
    <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="380" cy="400" r="10" fill="white" opacity="0.5">
    <animate attributeName="opacity" values="0.5;0.2;0.5" dur="3s" repeatCount="indefinite"/>
  </circle>
  
  <!-- Small decorative hearts -->
  <path d="M 85 380 C 85 370, 75 365, 70 370 C 65 365, 55 370, 55 380 C 55 395, 70 405, 70 405 C 70 405, 85 395, 85 380" 
        fill="#FF6B9D" opacity="0.7"/>
  <path d="M 445 130 C 445 120, 435 115, 430 120 C 425 115, 415 120, 415 130 C 415 145, 430 155, 430 155 C 430 155, 445 145, 445 130" 
        fill="#FF6B9D" opacity="0.6"/>
</svg>
